name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: dev
          POSTGRES_PASSWORD: dev_pass
          POSTGRES_DB: discogs
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -q -d discogs -U dev"
          --health-interval 5s
          --health-timeout 2s
          --health-retries 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Check
        run: cargo check --workspace

      - name: Run releases
        run: cargo run --bin discogs-load discogs-load/test_data/releases.xml.gz

      - name: Run labels
        run: cargo run --bin discogs-load discogs-load/test_data/labels.xml.gz

      - name: Run artists
        run: cargo run --bin discogs-load discogs-load/test_data/artists.xml.gz

      - name: Run masters
        run: cargo run --bin discogs-load discogs-load/test_data/masters.xml.gz
